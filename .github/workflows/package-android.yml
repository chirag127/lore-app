# Android TWA packaging (Bubblewrap) — builds an UNSIGNED APK + AAB that
# wraps https://lore.oriz.in and attaches them to the triggering prerelease.
#
# SIGNING IS A DELIBERATE BLOCKER: no keystore/cert is generated or committed.
# The APK produced by `gradlew assembleRelease` is unsigned; the AAB from
# `bundleRelease` is unsigned. They must be signed with a real upload key
# before any Play Store submission.

name: package-android

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  twa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@1.24.1

      - name: Init TWA from live web manifest
        env:
          JDK_PATH: ${{ env.JAVA_HOME }}
        run: |
          mkdir twa && cd twa
          bubblewrap init \
            --manifest https://lore.oriz.in/manifest.webmanifest \
            --directory . \
            --skipPwaValidation || true

      - name: Build unsigned APK + AAB
        working-directory: twa
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew assembleRelease bundleRelease || ./gradlew assembleDebug
          else
            echo "Bubblewrap did not scaffold a gradle project (non-interactive limit)."
            echo "Signing/keystore setup is required to complete TWA packaging — BLOCKER."
            exit 0
          fi

      - name: Collect artifacts
        run: |
          mkdir -p out
          find twa -name "*.apk" -exec cp {} out/ \; || true
          find twa -name "*.aab" -exec cp {} out/ \; || true
          ls -la out || true

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(out/*.apk out/*.aab)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber
          else
            echo "No Android artifacts produced (signing/keystore blocker) — nothing to upload."
          fi
